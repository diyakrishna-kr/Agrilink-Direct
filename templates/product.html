{% extends 'layout.html' %}
{% block content %}
<h2>Products</h2>
<form method="post" class="row g-2 mb-3">
  <div class="col-md-2"><select name="farmer_id" class="form-select" required><option value="">Farmer...</option>{% for f in farmers %}<option value="{{ f.farmer_id }}">{{ f.name }}</option>{% endfor %}</select></div>
  <div class="col-md-2"><input name="product_name" class="form-control" placeholder="Product" required></div>
  <div class="col-md-2"><select name="category" class="form-select" required><option value="Vegetable">Vegetable</option><option value="Fruit">Fruit</option><option value="Grain">Grain</option></select></div>
  <div class="col-md-2"><input name="price_per_kg" type="number" step="0.01" class="form-control" placeholder="Price" required></div>
  <div class="col-md-2"><input name="available_quantity" type="number" step="0.01" class="form-control" placeholder="Quantity" required></div>
  <div class="col-md-2"><button class="btn btn-primary">Add Product</button></div>
</form>
<table class="table table-sm"><thead><tr><th>Name</th><th>Farmer</th><th>Category</th><th>Price</th><th>Stock</th></tr></thead><tbody>{% for p in products %}<tr><td>{{ p.product_name }}</td><td>{{ p.farmer.name }}</td><td>{{ p.category }}</td><td>{{ p.price_per_kg }}</td><td>{{ p.available_quantity }}</td></tr>{% endfor %}</tbody></table>
{% endblock %}
