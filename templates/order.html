{% extends 'layout.html' %}
{% block content %}
<h2>Place Order</h2>
<form method="post" class="row g-2 mb-3">
  <div class="col-md-3"><select name="customer_id" class="form-select" required><option value="">Select Customer</option>{% for c in customers %}<option value="{{ c.customer_id }}">{{ c.name }}</option>{% endfor %}</select></div>
  <div class="col-md-3"><select name="product_id" class="form-select" required><option value="">Select Product</option>{% for p in products %}<option value="{{ p.product_id }}">{{ p.product_name }} - {{ p.available_quantity }} kg</option>{% endfor %}</select></div>
  <div class="col-md-2"><input name="quantity" type="number" step="0.01" class="form-control" placeholder="Qty" required></div>
  <div class="col-md-2"><select name="payment_mode" class="form-select" required><option value="Cash">Cash</option><option value="Card">Card</option><option value="UPI">UPI</option></select></div>
  <div class="col-md-2"><button class="btn btn-success">Place Order</button></div>
</form>
<h3>Orders</h3>
<table class="table table-sm">
<thead><tr><th>ID</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th></tr></thead>
<tbody>{% for o in orders %}<tr><td>{{ o.order_id }}</td><td>{{ o.customer.name }}</td><td>{{ o.total_amount }}</td><td>{{ o.order_status }}</td><td>{{ o.order_date.strftime('%Y-%m-%d %H:%M') }}</td></tr>{% endfor %}</tbody>
</table>
{% endblock %}
