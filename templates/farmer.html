{% extends 'layout.html' %}
{% block content %}
<h2>Farmers</h2>
<form method="post" class="row g-2 mb-3">
  <div class="col-md-3"><input name="name" class="form-control" placeholder="Name" required></div>
  <div class="col-md-2"><input name="phone" class="form-control" placeholder="Phone"></div>
  <div class="col-md-3"><input name="location" class="form-control" placeholder="Location"></div>
  <div class="col-md-4"><input name="bank_details" class="form-control" placeholder="Bank Details"></div>
  <div class="col-12"><button class="btn btn-primary">Add Farmer</button></div>
</form>
<ul>
  {% for f in farmers %}<li>{{ f.name }} ({{ f.location }})</li>{% endfor %}
</ul>
{% endblock %}
